{% extends 'base.html' %}
{% block title %}Login - SmartTrack{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:linear-gradient(135deg,#6C63FF,#3b3795)">
  <div class="card p-4" style="width:100%;max-width:420px">
    <div class="text-center mb-4">
      <i class="bi bi-wallet2 fs-1" style="color:#6C63FF"></i>
      <h3 class="fw-bold mt-2">SmartTrack</h3>
      <p class="text-muted">Sign in to your account</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">Sign In</button>
    </form>
    <hr/>
    <p class="text-center mb-0">Don't have an account? <a href="{% url 'signup' %}" style="color:#6C63FF">Sign up</a></p>
  </div>
</div>
{% endblock %}
